<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Road Trip — All 28 States Planner</title>
<style>
  :root {
    --bg1:#0a0f1e; --bg2:#0d1f3c; --bg3:#1a1040;
    --gold:#f59e0b; --text:#f1f5f9; --muted:#94a3b8; --dim:#64748b;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    min-height:100vh;
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 60%,var(--bg1) 100%);
    color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
  }

  /* Login Portal Styling */
  #login-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000; padding: 20px;
  }
  .login-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(245, 158, 11, 0.25);
    padding: 32px 24px; border-radius: 16px;
    width: 100%; max-width: 380px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    text-align: center;
  }
  .login-card h2 { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 6px; letter-spacing: 1px; }
  .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .form-group { text-align: left; margin-bottom: 18px; }
  .form-group label { display: block; font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
  .form-group input {
    width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: var(--gold); color: var(--bg1); font-weight: 700; font-size: 13px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.9; }
  #login-err { color: #f87171; font-size: 12px; margin-top: 14px; display: none; font-weight: 600; }

  /* App Dashboard Frame */
  #main-app { display: none; }
  .header {
    background:linear-gradient(90deg,#0d2137,#1a1040);
    border-bottom:2px solid var(--gold);
    padding:20px 20px 0;
  }
  .header-inner, .content { max-width:900px; margin:0 auto; }
  .eyebrow { font-size:11px; color:var(--gold); letter-spacing:3px; margin-bottom:6px; }
  .title { font-size:24px; font-weight:900; color:#fff; margin-bottom:4px; }
  .subtitle { font-size:13px; color:var(--muted); margin-bottom:16px; }

  /* Dynamic Parameter Control Bar */
  .control-panel {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr) auto;
    gap: 12px;
    align-items: end;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label { font-size: 10px; color: var(--gold); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
  .control-group input, .control-group select {
    padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; outline: none;
  }
  .control-group input:focus { border-color: var(--gold); }
  .update-btn {
    padding: 10px 20px; background: var(--gold); color: var(--bg1);
    border: none; border-radius: 6px; font-weight: 700; font-size: 13px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px; height: 38px;
  }
  
  /* Mobile Horizontal Tab Navigation Box */
  .tabs-scroll-box { overflow-x: auto; margin-right: -20px; padding-right: 20px; -webkit-overflow-scrolling: touch; }
  .tabs-scroll-box::-webkit-scrollbar { display: none; }
  .tabs { display:flex; gap:8px; flex-wrap:nowrap; width: max-content; padding-bottom: 2px; }
  .tab-btn {
    padding:10px 18px; border-radius:8px 8px 0 0; border:none;
    background:rgba(255,255,255,0.06); color:var(--muted);
    font-weight:700; font-size:12px; cursor:pointer;
    text-transform:uppercase; letter-spacing:1px; white-space: nowrap;
  }
  .tab-btn.active { background:var(--gold); color:var(--bg1); }
  .content { padding:24px 16px; }
  .view { display:none; }
  .view.active { display:block; }

  /* Stats overview block */
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
  .stat-card {
    background:rgba(255,255,255,0.05); border-radius:12px; padding:16px 18px;
    border:1px solid rgba(245,158,11,0.2); text-align:center;
  }
  .stat-label { font-size:11px; color:var(--muted); letter-spacing:1px; margin-bottom:6px; }
  .stat-value { font-size:19px; font-weight:800; color:var(--gold); }

  .section-label { margin-bottom:20px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }

  .leg-card {
    background:rgba(255,255,255,0.04); border-radius:14px; padding:14px 18px; margin-bottom:10px;
    cursor:pointer; display:flex; align-items:center; gap:14px; transition:background .2s;
    border:1px solid;
  }
  .leg-card:hover { background:rgba(255,255,255,0.08); }
  .leg-badge {
    width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px; color:#fff; flex-shrink:0;
  }
  .leg-card-title { font-weight:700; font-size:15px; }
  .leg-card-sub { font-size:12px; color:var(--dim); margin-top:3px; }
  .leg-card-arrow { color:var(--gold); font-size:18px; margin-left:auto; }

  .route-box {
    margin-top:24px; background:rgba(245,158,11,0.07); border:1px solid rgba(245,158,11,0.27);
    border-radius:14px; padding:18px 20px;
  }
  .route-box-title { font-weight:700; color:var(--gold); margin-bottom:10px; }
  .route-text { font-size:12px; color:#cbd5e1; line-height:2; word-break: break-word; }
  .route-text b { color:#fff; }

  /* Itinerary panel contents */
  .leg-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .leg-pill {
    padding:6px 12px; border-radius:999px; border:2px solid #334155;
    background:transparent; color:#fff; font-weight:700; font-size:11px; cursor:pointer;
  }
  .leg-pill.active { border-color: var(--pill-color, var(--gold)); background: var(--pill-color, var(--gold)); }

  .empty-hint { color:#475569; text-align:center; padding:60px 0; font-size:14px; }

  .leg-header { margin-bottom:20px; }
  .leg-header-days { font-size:10px; letter-spacing:4px; margin-bottom:4px; }
  .leg-header-title { font-size:20px; font-weight:800; }
  .leg-header-sub { font-size:12px; color:var(--muted); margin-top:4px; }

  .stop-card { background:rgba(255,255,255,0.04); border-radius:14px; margin-bottom:12px; overflow:hidden; border:1px solid; }
  .stop-head { padding:13px 17px; cursor:pointer; display:flex; align-items:center; gap:12px; }
  .stop-day-badge { border-radius:7px; padding:4px 9px; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
  .stop-route { flex:1; min-width: 0; }
  .stop-route .from, .stop-route .to { font-weight:700; font-size:14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 90px; vertical-align: bottom; }
  .stop-route .arrow { color:#475569; margin:0 4px; }
  .stop-route .meta { color:#475569; font-size:11px; margin-left:4px; display: block; margin-top: 2px; }
  .stop-chevron { color:var(--gold); }
  .stop-body { padding:0 17px 17px; border-top:1px solid; }
  .stop-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .stop-panel { background:rgba(0,0,0,0.25); border-radius:10px; padding:12px; }
  .panel-label { font-size:10px; color:var(--muted); margin-bottom:6px; letter-spacing:1px; }
  .panel-line { font-size:12px; color:#e2e8f0; margin-bottom:3px; }
  .panel-note { font-size:10px; color:var(--dim); margin-top:5px; }
  .stop-tip-panel { background:rgba(245,158,11,0.08); border-radius:10px; padding:12px; border:1px solid rgba(245,158,11,0.2); }
  .stop-tip-label { font-size:10px; color:var(--gold); margin-bottom:4px; }
  .stop-tip-text { font-size:11px; color:#e2e8f0; line-height:1.6; }
  .fuel-value { font-size:16px; font-weight:800; color:var(--gold); }
  .hidden { display:none; }

  /* Checklist and state configurations */
  .states-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .state-card {
    background:rgba(255,255,255,0.04); border-radius:10px; padding:12px 14px;
    display:flex; align-items:center; gap:10px; border:1px solid;
  }
  .state-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .state-name { font-weight:600; font-size:13px; }
  .state-leg { font-size:10px; color:var(--dim); margin-top:1px; }
  .state-check { font-size:16px; margin-left:auto; }
  .states-summary {
    margin-top:20px; background:rgba(22,163,74,0.1); border:1px solid rgba(22,163,74,0.33);
    border-radius:12px; padding:14px 18px; text-align:center;
  }
  .states-summary-num { font-size:20px; font-weight:800; color:#4ade80; }
  .states-summary-note { font-size:12px; color:var(--muted); margin-top:4px; }

  /* Financial tracking blocks */
  .expense-row {
    background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 18px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.07); display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .expense-label { font-size:13px; color:#e2e8f0; }
  .expense-note { font-size:11px; color:var(--dim); margin-top:2px; }
  .expense-amount { font-weight:800; color:var(--gold); font-size:14px; flex-shrink:0; }
  .total-box {
    background:linear-gradient(90deg,rgba(245,158,11,0.13),rgba(245,158,11,0.07));
    border-radius:14px; padding:18px 22px; margin-top:16px; border:2px solid var(--gold);
    display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap:10px;
  }
  .total-label { font-size:11px; color:var(--gold); letter-spacing:2px; }
  .total-sub { font-size:13px; font-weight:700; color:#fff; margin-top:2px; }
  .total-value { font-size:24px; font-weight:900; color:#fff; }
  .budget-cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .budget-col { background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 16px; }
  .budget-col-title { font-weight:700; margin-bottom:8px; font-size:13px; }
  .budget-col-title.good { color:#4ade80; }
  .budget-col-title.warn { color:#f87171; }
  .budget-line { font-size:11px; color:#cbd5e1; margin-bottom:5px; }

  /* Travel advice columns */
  .tip-card {
    background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 18px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.06); display:flex; gap:12px;
  }
  .tip-icon { font-size:24px; flex-shrink:0; }
  .tip-title { font-weight:700; font-size:14px; margin-bottom:4px; }
  .tip-body { font-size:12px; color:#cbd5e1; line-height:1.7; }

  /* Mobile Layout Adaptation Queries */
  @media (max-width:600px) {
    .control-panel { grid-template-columns: 1fr; gap: 12px; }
    .stats-grid, .stop-grid2, .budget-cols, .states-grid { grid-template-columns:1fr; }
    .title { font-size:20px; }
    .eyebrow { letter-spacing:1px; }
    .stop-route { display: flex; flex-direction: column; }
    .stop-route .from, .stop-route .to { max-width: 100%; display: inline; }
    .stop-route .arrow { display: none; }
    .stop-route .meta { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- User Sign-In Protection Overlay -->
<div id="login-overlay">
  <div class="login-card">
    <h2>Road Trip Portal</h2>
    <p>Sign in to unlock the dynamic master itinerary</p>
    <div class="form-group">
      <label for="uid">Username</label>
      <input type="text" id="uid" autocomplete="off" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label for="pwd">Password</label>
      <input type="password" id="pwd" placeholder="Enter password">
    </div>
    <button class="login-btn" onclick="verifyCredentials()">Sign In</button>
    <div id="login-err">Invalid Username or Password</div>
  </div>
</div>

<!-- Main Core Application Interface -->
<div id="main-app">
  <div class="header">
    <div class="header-inner">
      <div class="eyebrow">🇮🇳 COMPLETE INDIA ROAD TRIP — ALL 28 STATES</div>
      <div class="title">Kochi → 28 States → Kochi</div>
     
      
      <!-- Interactive Parameter Configuration Panel -->
      <div class="control-panel">
        <div class="control-group">
          <label>Target Budget Tier</label>
          <select id="param-budget">
            <option value="budget">Budget (₹2.5L - ₹3.5L Tier)</option>
            <option value="standard" selected>Standard (₹3.5L - ₹5.0L Tier)</option>
            <option value="luxury">Luxury / Premium (₹5.0L+ Tier)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Mileage (km/l)</label>
          <input type="number" id="param-mileage" value="15" min="6" max="28" step="0.5">
        </div>
        <div class="control-group">
          <label>Duration (Min 30 Days)</label>
          <input type="number" id="param-days" value="66" min="30" max="120">
        </div>
        <button class="update-btn" onclick="rebuildTripEngine()">Plan Trip</button>
      </div>

      <div class="tabs-scroll-box">
        <div class="tabs" id="tabs"></div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="view active" id="view-overview"></div>
    <div class="view" id="view-itinerary"></div>
    <div class="view" id="view-states"></div>
    <div class="view" id="view-budget"></div>
    <div class="view" id="view-tips"></div>
  </div>
</div>

<script>
// Authentication Engine
function verifyCredentials() {
  const user = document.getElementById("uid").value;
  const pass = document.getElementById("pwd").value;
  const errorMsg = document.getElementById("login-err");

  if (user === "Ameesh" && pass === "karthika") {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    rebuildTripEngine();
  } else {
    errorMsg.style.display = "block";
  }
}

document.querySelectorAll("#login-overlay input").forEach(el => {
  el.addEventListener("keypress", (event) => {
    if (event.key === "Enter") verifyCredentials();
  });
});

let legs = []; 
let dynamicExpenses = [];
let activeLeg = null;
let activeDay = null;
let currentView = "overview";

function totalKm() { return baseLegs.reduce((a,l)=>a+l.km,0); }

// Primary Computation Engine translating dynamic parameters into metrics
function rebuildTripEngine() {
  userConfig.tier = document.getElementById("param-budget").value;
  userConfig.mileage = parseFloat(document.getElementById("param-mileage").value) || 15;
  
  let targetedDaysInput = parseInt(document.getElementById("param-days").value) || 66;
  
  // Guardrail enforcement block checking minimum days constraints
  if (targetedDaysInput < 30) {
    alert("Duration cannot be less than 30 days! Automatically adjusting to 30 days.");
    targetedDaysInput = 30;
    document.getElementById("param-days").value = 30;
  }
  userConfig.totalDays = targetedDaysInput;

  // Rate Multipliers mapping to selected Tier Profiles
  let hotelCostPerNight = 3500;
  let foodCostPerDayPerHead = 400; 
  let stayClassModifier = "";

  if (userConfig.tier === 'budget') {
    hotelCostPerNight = 1800;
    foodCostPerDayPerHead = 250;
    stayClassModifier = " (Budget Homestay / OYO)";
  } else if (userConfig.tier === 'luxury') {
    hotelCostPerNight = 7500;
    foodCostPerDayPerHead = 900;
    stayClassModifier = " (Premium Resort / 5-Star)";
  } else {
    stayClassModifier = " (Standard Hotel / Heritage)";
  }

  let dayTracker = 1;
  legs = baseLegs.map((bLeg, index) => {
    let allocatedDays = Math.round(bLeg.baseDaysPct * userConfig.totalDays);
    if (index === baseLegs.length - 1) {
      let allocatedTotalSoFar = baseLegs.slice(0, -1).reduce((acc, current) => acc + Math.round(current.baseDaysPct * userConfig.totalDays), 0);
      allocatedDays = userConfig.totalDays - allocatedTotalSoFar;
    }
    if (allocatedDays < 2) allocatedDays = 2; // Safeguard minimum chunk scale

    let startDay = dayTracker;
    let endDay = dayTracker + allocatedDays - 1;
    dayTracker = endDay + 1;

    let updatedRoute = bLeg.route.map((r) => {
      let stopDayNum = startDay + Math.floor((r.rIndex / bLeg.route.length) * allocatedDays);
      if (r.rIndex === bLeg.route.length - 1) stopDayNum = endDay;
      
      // Fuel configuration algorithm tied entirely to custom vehicle input parameters
      let fuelCost = Math.round((r.km / userConfig.mileage) * 105);
      let localFoodEst = foodCostPerDayPerHead * 2;
      let localStayEst = (r.stayBudget === "Home 🏠") ? 0 : hotelCostPerNight;

      return {
        day: `Day ${stopDayNum}`,
        from: r.from,
        to: r.to,
        km: r.km,
        dur: `${Math.round(r.km / 55 + 2)}h`,
        spots: r.spots,
        stay: r.stayBudget === "Home 🏠" ? "Home 🏠" : r.stayBudget + stayClassModifier,
        stayEst: `₹${localStayEst.toLocaleString()}`,
        food: userConfig.tier === 'budget' ? ["Local Dhabas", "Street Eateries"] : userConfig.tier === 'luxury' ? ["Fine Dining", "In-house Resorts"] : ["Recommended Standard", "Popular Local Hubs"],
        foodEst: `₹${localFoodEst}`,
        fuel: `₹${fuelCost.toLocaleString()}`,
        tip: r.tip
      };
    });

    return {
      id: bLeg.id,
      leg: bLeg.leg,
      title: bLeg.title,
      color: bLeg.color,
      days: `Day ${startDay}–${endDay}`,
      km: bLeg.km,
      states: bLeg.states,
      route: updatedRoute
    };
  });

  // Calculate dynamic global budget ledger data profiles
  let aggregateFuel = Math.round((totalKm() / userConfig.mileage) * 105);
  let aggregateHotels = hotelCostPerNight * (userConfig.totalDays - 1); 
  let aggregateFood = (foodCostPerDayPerHead * 2) * userConfig.totalDays;
  let generalTolls = 18000;
  let adminPermits = 5000;
  let operationalBuffer = userConfig.tier === 'luxury' ? 40000 : userConfig.tier === 'budget' ? 12000 : 20000;
  
  let totalCalculatedCost = aggregateFuel + aggregateHotels + aggregateFood + generalTolls + adminPermits + operationalBuffer;

  dynamicExpenses = [
    { label: `⛽ Fuel Allocation (~${totalKm().toLocaleString()} km @ ${userConfig.mileage} km/l)`, amount: `₹${aggregateFuel.toLocaleString()}`, note: `Calculated dynamically at fuel index cost profile tier rate of ₹105/liter` },
    { label: `🏨 Accommodations (${userConfig.totalDays} nights tier tracking pricing)`, amount: `₹${aggregateHotels.toLocaleString()}`, note: `Avg ₹${hotelCostPerNight}/night based on your selection parameters` },
    { label: "🍽 Food & Beverage (2 Pax combined allowances)", amount: `₹${aggregateFood.toLocaleString()}`, note: `Targeting entry parameters of ₹${foodCostPerDayPerHead * 2}/day combined` },
    { label: "🛣 Toll Networks & High-speed Fastag configurations", amount: `₹${generalTolls.toLocaleString()}`, note: "Standard route baseline calculations mapping profiles" },
    { label: "📋 Administrative entry passes & high altitude state permits", amount: `₹${adminPermits.toLocaleString()}`, note: "ILP & custom regional transit validations included" },
    { label: "🔧 Operational mechanical field repair buffer", amount: `₹${operationalBuffer.toLocaleString()}`, note: "Emergency support pool matching budget profiles" }
  ];

  document.getElementById("app-subtitle").innerText = `Maruti Jimny 4WD • 9 Legs • ~${totalKm().toLocaleString()} km @ ${userConfig.mileage} km/l • ${userConfig.totalDays} Days Configuration`;
  document.getElementById("main-app").dataset.totalSum = totalCalculatedCost;

  renderAll();
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  const views = ["overview","itinerary","states","budget","tips"];
  tabs.innerHTML = views.map(v =>
    `<button class="tab-btn ${v===currentView?'active':''}" data-view="${v}">${v}</button>`
  ).join("");
  tabs.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      currentView = btn.dataset.view;
      if (currentView !== "itinerary") activeLeg = null;
      renderAll();
    });
  });
}

    </div>
  </div>`;

  el.innerHTML = html;
  el.querySelectorAll(".leg-card").forEach(card=>{
    card.addEventListener("click", ()=>{
      activeLeg = parseInt(card.dataset.leg);
      currentView = "itinerary";

      renderAll();

function renderItinerary() {
  const el = document.getElementById("view-itinerary");
  let html = `<div class="leg-pills">`;
  legs.forEach(leg=>{

    html += `<button class="leg-pill ${isActive?'active':''}" style="--pill-color:${leg.color}" data-leg="${leg.id}">LEG ${leg.id}</button>`;
  });
  html += `</div>`;

  if (!activeLeg) {
    html += `<div class="empty-hint">👆 Select a tracking leg from above to parse dynamic daily timelines</div>`;
  } else {
    const selectedLeg = legs.find(l=>l.id===activeLeg);
    html += `<div class="leg-header">
      <div class="leg-header-days" style="color:${selectedLeg.color}">${selectedLeg.days}</div>
      <div class="leg-header-title">${selectedLeg.leg}: ${selectedLeg.title}</div>
      <div class="leg-header-sub">${selectedLeg.states.join(" • ")} • ${selectedLeg.km.toLocaleString()} km</div>
    </div>`;

    selectedLeg.route.forEach((stop,i)=>{
      const isOpen = activeDay===i;
      html += `<div class="stop-card" style="border-color:${selectedLeg.color}33">
        <div class="stop-head" data-day="${i}">
          <div class="stop-day-badge" style="background:${selectedLeg.color}">${stop.day}</div>
          <div class="stop-route">
            <span class="from">${stop.from}</span>
            <span class="arrow">→</span>
            <span class="to">${stop.to}</span>
            <span class="meta">${stop.km} km • ${stop.dur}</span>
          </div>
          <span class="stop-chevron">${isOpen?'▲':'▼'}</span>
        </div>
        <div class="stop-body ${isOpen?'':'hidden'}" style="border-color:${selectedLeg.color}22">
          <div class="stop-grid2">
            <div class="stop-panel">
              <div class="panel-label">📍 SPOTS</div>
              ${stop.spots.map(s=>`<div class="panel-line">• ${s}</div>`).join("")}
            </div>
            <div class="stop-panel">
              <div class="panel-label">🍽 DIETARY MODEL</div>
              ${stop.food.map(f=>`<div class="panel-line">• ${f}</div>`).join("")}
              <div class="panel-note">Est: ${stop.foodEst}/day</div>
            </div>
          </div>

            <div class="panel-label">🏨 ACCOMMODATION SELECTION</div>
