<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>India Road Trip — All 28 States</title>
<style>
  :root {
    --bg1:#0a0f1e; --bg2:#0d1f3c; --bg3:#1a1040;
    --gold:#f59e0b; --text:#f1f5f9; --muted:#94a3b8; --dim:#64748b;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    min-height:100vh;
    background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 60%,var(--bg1) 100%);
    color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
  }
  .header {
    background:linear-gradient(90deg,#0d2137,#1a1040);
    border-bottom:2px solid var(--gold);
    padding:20px 20px 0;
  }
  .header-inner, .content { max-width:900px; margin:0 auto; }
  .eyebrow { font-size:11px; color:var(--gold); letter-spacing:5px; margin-bottom:6px; }
  .title { font-size:26px; font-weight:900; color:#fff; margin-bottom:4px; }
  .subtitle { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .tabs { display:flex; gap:8px; flex-wrap:wrap; }
  .tab-btn {
    padding:10px 18px; border-radius:8px 8px 0 0; border:none;
    background:rgba(255,255,255,0.06); color:var(--muted);
    font-weight:700; font-size:12px; cursor:pointer;
    text-transform:uppercase; letter-spacing:1px;
  }
  .tab-btn.active { background:var(--gold); color:var(--bg1); }
  .content { padding:24px 16px; }
  .view { display:none; }
  .view.active { display:block; }

  /* Overview stats grid */
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
  .stat-card {
    background:rgba(255,255,255,0.05); border-radius:12px; padding:16px 18px;
    border:1px solid rgba(245,158,11,0.2); text-align:center;
  }
  .stat-label { font-size:11px; color:var(--muted); letter-spacing:1px; margin-bottom:6px; }
  .stat-value { font-size:22px; font-weight:800; color:var(--gold); }

  .section-label { margin-bottom:20px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; }

  .leg-card {
    background:rgba(255,255,255,0.04); border-radius:14px; padding:14px 18px; margin-bottom:10px;
    cursor:pointer; display:flex; align-items:center; gap:14px; transition:background .2s;
    border:1px solid; /* color set inline per leg */
  }
  .leg-card:hover { background:rgba(255,255,255,0.08); }
  .leg-badge {
    width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px; color:#fff; flex-shrink:0;
  }
  .leg-card-title { font-weight:700; font-size:15px; }
  .leg-card-sub { font-size:12px; color:var(--dim); margin-top:3px; }
  .leg-card-arrow { color:var(--gold); font-size:18px; margin-left:auto; }

  .route-box {
    margin-top:24px; background:rgba(245,158,11,0.07); border:1px solid rgba(245,158,11,0.27);
    border-radius:14px; padding:18px 20px;
  }
  .route-box-title { font-weight:700; color:var(--gold); margin-bottom:10px; }
  .route-text { font-size:12px; color:#cbd5e1; line-height:2; }
  .route-text b { color:#fff; }

  /* Itinerary view */
  .leg-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .leg-pill {
    padding:6px 12px; border-radius:999px; border:2px solid #334155;
    background:transparent; color:#fff; font-weight:700; font-size:11px; cursor:pointer;
  }
  .leg-pill.active { border-color: var(--pill-color, var(--gold)); background: var(--pill-color, var(--gold)); }

  .empty-hint { color:#475569; text-align:center; padding:60px 0; font-size:14px; }

  .leg-header { margin-bottom:20px; }
  .leg-header-days { font-size:10px; letter-spacing:4px; margin-bottom:4px; }
  .leg-header-title { font-size:20px; font-weight:800; }
  .leg-header-sub { font-size:12px; color:var(--muted); margin-top:4px; }

  .stop-card { background:rgba(255,255,255,0.04); border-radius:14px; margin-bottom:12px; overflow:hidden; border:1px solid; }
  .stop-head { padding:13px 17px; cursor:pointer; display:flex; align-items:center; gap:12px; }
  .stop-day-badge { border-radius:7px; padding:4px 9px; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
  .stop-route { flex:1; }
  .stop-route .from, .stop-route .to { font-weight:700; font-size:14px; }
  .stop-route .arrow { color:#475569; margin:0 8px; }
  .stop-route .meta { color:#475569; font-size:11px; margin-left:8px; }
  .stop-chevron { color:var(--gold); }
  .stop-body { padding:0 17px 17px; border-top:1px solid; }
  .stop-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .stop-panel { background:rgba(0,0,0,0.25); border-radius:10px; padding:12px; }
  .panel-label { font-size:10px; color:var(--muted); margin-bottom:6px; letter-spacing:1px; }
  .panel-line { font-size:12px; color:#e2e8f0; margin-bottom:3px; }
  .panel-note { font-size:10px; color:var(--dim); margin-top:5px; }
  .stop-tip-panel { background:rgba(245,158,11,0.08); border-radius:10px; padding:12px; border:1px solid rgba(245,158,11,0.2); }
  .stop-tip-label { font-size:10px; color:var(--gold); margin-bottom:4px; }
  .stop-tip-text { font-size:11px; color:#e2e8f0; line-height:1.6; }
  .fuel-value { font-size:16px; font-weight:800; color:var(--gold); }
  .hidden { display:none; }

  /* States view */
  .states-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .state-card {
    background:rgba(255,255,255,0.04); border-radius:10px; padding:12px 14px;
    display:flex; align-items:center; gap:10px; border:1px solid;
  }
  .state-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .state-name { font-weight:600; font-size:13px; }
  .state-leg { font-size:10px; color:var(--dim); margin-top:1px; }
  .state-check { font-size:16px; margin-left:auto; }
  .states-summary {
    margin-top:20px; background:rgba(22,163,74,0.1); border:1px solid rgba(22,163,74,0.33);
    border-radius:12px; padding:14px 18px; text-align:center;
  }
  .states-summary-num { font-size:20px; font-weight:800; color:#4ade80; }
  .states-summary-note { font-size:12px; color:var(--muted); margin-top:4px; }

  /* Budget view */
  .expense-row {
    background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 18px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.07); display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .expense-label { font-size:14px; color:#e2e8f0; }
  .expense-note { font-size:11px; color:var(--dim); margin-top:2px; }
  .expense-amount { font-weight:800; color:var(--gold); font-size:15px; flex-shrink:0; }
  .total-box {
    background:linear-gradient(90deg,rgba(245,158,11,0.13),rgba(245,158,11,0.07));
    border-radius:14px; padding:18px 22px; margin-top:16px; border:2px solid var(--gold);
    display:flex; justify-content:space-between; align-items:center;
  }
  .total-label { font-size:11px; color:var(--gold); letter-spacing:2px; }
  .total-sub { font-size:15px; font-weight:700; color:#fff; margin-top:2px; }
  .total-value { font-size:26px; font-weight:900; color:#fff; }
  .budget-cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .budget-col { background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 16px; }
  .budget-col-title { font-weight:700; margin-bottom:8px; font-size:13px; }
  .budget-col-title.good { color:#4ade80; }
  .budget-col-title.warn { color:#f87171; }
  .budget-line { font-size:11px; color:#cbd5e1; margin-bottom:5px; }

  /* Tips view */
  .tip-card {
    background:rgba(255,255,255,0.04); border-radius:12px; padding:14px 18px; margin-bottom:10px;
    border:1px solid rgba(255,255,255,0.06); display:flex; gap:12px;
  }
  .tip-icon { font-size:24px; flex-shrink:0; }
  .tip-title { font-weight:700; font-size:14px; margin-bottom:4px; }
  .tip-body { font-size:12px; color:#cbd5e1; line-height:1.7; }

  @media (max-width:520px){
    .stats-grid, .stop-grid2, .budget-cols, .states-grid { grid-template-columns:1fr; }
  }
</style>
</head>

let activeLeg = null;
let activeDay = null;
let currentView = "overview";

function totalKm() { return legs.reduce((a,l)=>a+l.km,0); }

function renderTabs() {
  const tabs = document.getElementById("tabs");
  const views = ["overview","itinerary","states","budget","tips"];
  tabs.innerHTML = views.map(v =>
    `<button class="tab-btn ${v===currentView?'active':''}" data-view="${v}">${v}</button>`
  ).join("");
  tabs.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      currentView = btn.dataset.view;
      if (currentView !== "itinerary") activeLeg = null;
      renderAll();
    });
  });
}

function renderOverview() {
  const el = document.getElementById("view-overview");
  const stats = [
    {l:"Total Distance", v:`~${totalKm().toLocaleString()} km`},
    {l:"Journey Duration", v:"66 Days"},
    {l:"States Covered", v:"28 States"},
    {l:"Total Budget Est.", v:"₹4.6 – 5.0 Lakhs"},
  ];
  let html = `<div class="stats-grid">`;
  stats.forEach(s=>{
    html += `<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value">${s.v}</div></div>`;
  });
  html += `</div>`;

  html += `<div class="section-label">9 Journey Legs</div>`;
  legs.forEach(leg=>{
    html += `<div class="leg-card" style="border-color:${leg.color}44" data-leg="${leg.id}">
      <div class="leg-badge" style="background:${leg.color}">${leg.id}</div>
      <div style="flex:1">
        <div class="leg-card-title">${leg.leg}: ${leg.title}</div>
        <div class="leg-card-sub">${leg.days} • ${leg.km.toLocaleString()} km • ${leg.states.join(", ")}</div>
      </div>
      <div class="leg-card-arrow">›</div>
    </div>`;
  });

  html += `<div class="route-box">
    <div class="route-box-title">🗺 Master Route</div>
    <div class="route-text">
      <b>Kochi</b>→Munnar→Madurai→Kanyakumari→Ooty→Mysuru→Coorg→Hampi→<b>Bengaluru</b>→<b>Goa</b>→<b>Mumbai</b>→Pune→Aurangabad→<b>Ahmedabad</b>→Kutch→Somnath→<b>Udaipur</b>→Jodhpur→Jaisalmer→Pushkar→<b>Jaipur</b>→Ranthambore→Gwalior→Khajuraho→Bhopal→Kanha→<b>Raipur</b>→<b>Ranchi</b>→Bodh Gaya→<b>Patna</b>→Varanasi→<b>Agra</b>→<b>Delhi</b>→Kurukshetra→<b>Chandigarh</b>→Rishikesh→Corbett→<b>Amritsar</b>→<b>Shimla</b>→<b>Manali</b>→Dharamshala→<b>Kolkata</b>→<b>Gangtok</b>→<b>Guwahati</b>→<b>Shillong</b>→<b>Agartala</b>→<b>Aizawl</b>→<b>Imphal</b>→<b>Kohima</b>→<b>Itanagar</b>→Bhubaneswar→Puri→Vizag→<b>Hyderabad</b>→Tirupati→<b>Kochi</b> 🏁
    </div>
  </div>`;

  el.innerHTML = html;
  el.querySelectorAll(".leg-card").forEach(card=>{
    card.addEventListener("click", ()=>{
      activeLeg = parseInt(card.dataset.leg);
      currentView = "itinerary";
      activeDay = null;
      renderAll();
    });
  });
}

function renderItinerary() {
  const el = document.getElementById("view-itinerary");
  let html = `<div class="leg-pills">`;
  legs.forEach(leg=>{
    const isActive = activeLeg===leg.id;
    html += `<button class="leg-pill ${isActive?'active':''}" style="--pill-color:${leg.color}" data-leg="${leg.id}">LEG ${leg.id}</button>`;
  });
  html += `</div>`;

  if (!activeLeg) {
    html += `<div class="empty-hint">👆 Select a leg above to view day-by-day itinerary</div>`;
  } else {
    const selectedLeg = legs.find(l=>l.id===activeLeg);
    html += `<div class="leg-header">
      <div class="leg-header-days" style="color:${selectedLeg.color}">${selectedLeg.days}</div>
      <div class="leg-header-title">${selectedLeg.leg}: ${selectedLeg.title}</div>
      <div class="leg-header-sub">${selectedLeg.states.join(" • ")} • ${selectedLeg.km.toLocaleString()} km</div>
    </div>`;

    selectedLeg.route.forEach((stop,i)=>{
      const isOpen = activeDay===i;
      html += `<div class="stop-card" style="border-color:${selectedLeg.color}33">
        <div class="stop-head" data-day="${i}">
          <div class="stop-day-badge" style="background:${selectedLeg.color}">${stop.day}</div>
          <div class="stop-route">
            <span class="from">${stop.from}</span>
            <span class="arrow">→</span>
            <span class="to">${stop.to}</span>
            <span class="meta">${stop.km} km • ${stop.dur}</span>
          </div>
          <span class="stop-chevron">${isOpen?'▲':'▼'}</span>
        </div>
        <div class="stop-body ${isOpen?'':'hidden'}" style="border-color:${selectedLeg.color}22">
          <div class="stop-grid2">
            <div class="stop-panel">
              <div class="panel-label">📍 SPOTS</div>
              ${stop.spots.map(s=>`<div class="panel-line">• ${s}</div>`).join("")}
            </div>
            <div class="stop-panel">
              <div class="panel-label">🍽 FOOD</div>
              ${stop.food.map(f=>`<div class="panel-line">• ${f}</div>`).join("")}
              <div class="panel-note">Est: ${stop.foodEst}/day</div>
            </div>
          </div>
          <div class="stop-panel" style="margin-top:10px">
            <div class="panel-label">🏨 STAY</div>
            <div class="panel-line" style="font-size:13px">${stop.stay}</div>
            <div class="panel-note">Est: ${stop.stayEst}/night</div>
          </div>
          <div class="stop-grid2" style="margin-top:10px">
            <div class="stop-panel">
              <div class="panel-label">⛽ FUEL</div>
              <div class="fuel-value">${stop.fuel}</div>
            </div>
            <div class="stop-tip-panel">
              <div class="stop-tip-label">⚠ TIP</div>
              <div class="stop-tip-text">${stop.tip}</div>
            </div>
          </div>
        </div>
      </div>`;
    });
  }

  el.innerHTML = html;
  el.querySelectorAll(".leg-pill").forEach(pill=>{
    pill.addEventListener("click", ()=>{
      activeLeg = parseInt(pill.dataset.leg);
      activeDay = null;
      renderAll();
    });
  });
  el.querySelectorAll(".stop-head").forEach(head=>{
    head.addEventListener("click", ()=>{
      const day = parseInt(head.dataset.day);
      activeDay = activeDay===day ? null : day;
      renderAll();
    });
  });
}

function renderStates() {
  const el = document.getElementById("view-states");
  let html = `<div class="section-label">All 28 States Coverage Checklist</div><div class="states-grid">`;
  legs.forEach(leg=>{
    leg.states.forEach(state=>{
      html += `<div class="state-card" style="border-color:${leg.color}33">
        <div class="state-dot" style="background:${leg.color}"></div>
        <div>
          <div class="state-name">${state}</div>
          <div class="state-leg">LEG ${leg.id}: ${leg.title}</div>
        </div>
        <div class="state-check">✅</div>
      </div>`;
    });
  });
  html += `</div>
    <div class="states-summary">
      <div class="states-summary-num">28 / 28 States ✅</div>
      <div class="states-summary-note">All Indian states covered — Union Territories excluded as requested</div>
    </div>`;
  el.innerHTML = html;
}

function renderBudget() {
  const el = document.getElementById("view-budget");
  let html = `<div class="section-label">Full Trip Budget — 2 Pax, 66 Days</div>`;
  expenses.forEach(e=>{
    html += `<div class="expense-row">
      <div>
        <div class="expense-label">${e.label}</div>
        <div class="expense-note">${e.note}</div>
      </div>
      <div class="expense-amount">${e.amount}</div>
    </div>`;
  });
  html += `<div class="total-box">
    <div>
      <div class="total-label">TOTAL ESTIMATED</div>
      <div class="total-sub">2 People • 66 Days • 28 States</div>
    </div>
    <div class="total-value">₹4.6 – 5.0L</div>
  </div>`;

  html += `<div class="budget-cols">
    <div class="budget-col">
      <div class="budget-col-title good">💡 Budget Tips</div>
      ${["Book via MakeMyTrip for 20-25% off","Eat at Udupi / state canteens","Carry OYO app for last-minute hotels","HDFC travel card for fuel cashback","Share rooms if solo sections arise"].map(t=>`<div class="budget-line">• ${t}</div>`).join("")}
    </div>
    <div class="budget-col">
      <div class="budget-col-title warn">⚠ Budget Watch</div>
      ${["NE permits add ₹5,000+","HP mountain tolls are steep","National Park safaris ₹2,000–5,000 each","Manali off-season hotels 60% cheaper","Petrol 15% costlier in NE states"].map(t=>`<div class="budget-line">• ${t}</div>`).join("")}
    </div>
  </div>`;

  el.innerHTML = html;
}

function renderTips() {
  const el = document.getElementById("view-tips");
  let html = `<div class="section-label">Jimny All-India Road Trip Essentials</div>`;
  tips.forEach(t=>{
    html += `<div class="tip-card">
      <div class="tip-icon">${t.icon}</div>
      <div>
        <div class="tip-title">${t.title}</div>
        <div class="tip-body">${t.body}</div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderAll() {
  renderTabs();
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+currentView).classList.add("active");

  renderOverview();
  renderItinerary();
  renderStates();
  renderBudget();
  renderTips();
}

renderAll();
</script>
